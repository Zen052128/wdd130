<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <div class="form-item colum2">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" required>
                </div>
                <div class="form-item column2">
                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" required>
                </div>
            </fieldset>
            <fieldset>
                <legend>Questions</legend>

                <div class="form-item column1">
                    <label for="favorite browser">What is your Favorite Browser?
                        <select name="favorite browser" id="favorite browser">
                            <option value="Chrome">Chrome</option>
                            <option value="Bing">Bing</option>
                            <option value="Firefox">Firefox</option>
                        </select>
                    </label>
                </div>
                <div class="form-item column1">
                    <label for="pet">Do you have a household pet?
                        <input type="checkbox" name="pet" id="pet">
                    </label>
                </div>
                <div class="form-item">
                    <label for="places">List the places you have lived.
                        <textarea type="textarea" name="places" id="places>"
                          placeholder="I used to live in..." rows="4"></textarea>
                    </label>
                </div>
            </fieldset>
            <button type="submit">Submit Poll</button>
        </form>
    </main>
    <footer>
        <p>©2026 | HTML Form-User Poll Activity | Kent Zeniff Depaloma</p>
    </footer>
</body>

</html>
