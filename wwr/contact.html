<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Above The Water! | Contact Section</title>
    <meta name="description"
      content="This page provides the necessary contact information for the website.">
    <meta name="author" content="Kent Zeniff Depaloma">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-raftingcompas.png"
          alt="A cartoon bird's eye view of a raft with people on it, paddling on a compass">

        <nav class="top">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main class="contact">
        <section class="company-info">
            <h1>Above the Water!</h1>
            <div name="address">
                <p>123 Main River Street</p>
                <p>Kolob, California</p>
                <p>+1 999 999 9999</p>
                <p>info@abovethewater.com</p>
            </div>
        </section>
        <img src="images/maps.jpg"
          alt="Google maps shot of the approximate place of above the water rafting river.">
        <form class="user-info">
            <div class="question-item name-question">
                <label for="username">Name</label>
                <input id="username" name="username" type="text" placeholder="Placeholder"
                  style="height: 2rem">
            </div>

            <div class="question-item email-question">
                <label for="useremail">Email</label>
                <input id="useremail" name="useremail" type="text" placeholder="Placeholder"
                  style="height: 2rem">
            </div>

            <div class="question-item purpose-question">
                <p>Message Purpose</p>
                <div>
                    <input type="radio" name="purpose" id="general-inq" value="general inquiry">
                    <label for="general-inq">General Inquiry</label>
                </div>

                <div>
                    <input type="radio" name="purpose" id="reservation-ques"
                      value="reservation question">
                    <label for="reservation-ques">Reservation Question</label>
                </div>

                <div>
                    <input type="radio" name="purpose" id="website-sugg" value="website suggestion">
                    <label for="website-sugg">Website Suggestion</label>
                </div>

            </div>

            <div class="question-item">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder=" Type here"></textarea>
            </div>

            <div class="question-item subscribe-question">
                <input type="checkbox" name="subscribe" id="subscribe">
                <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
            </div>

            <button type="submit">Get in Touch!</button>
        </form>

        <section class="face-card">
            <h2>We Are Here to Serve You</h2>
            <figure class="alex">
                <img src="images/alex.jpg" alt="Picture of Alex, employee in Above The Water!">
                <figcaption>Alex</figcaption>
            </figure>
            <figure class="bianca">
                <img src="images/bianca.jpg" alt="Picture of Bianca, employee in Above The Water!">
                <figcaption>Bianca</figcaption>
            </figure>
            <figure class="carol">
                <img src="images/carol.jpg" alt="Picture of Carol, employee in Above The Water!">
                <figcaption>Carol</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>©2026 | Above the Water! | Kent Zeniff Depaloma</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook725289.png" alt="Facebook Logo"></a>
            <a href="#"><img src="images/linkedin725337.png" alt="LinkedIn Logo"></a>
            <a href="#"><img src="images/youtube246153.png" alt="Youtube Logo"></a>
        </nav>
    </footer>
</body>

</html>
